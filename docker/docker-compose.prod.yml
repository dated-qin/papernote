# ============================================
# 纸条 PaperNote — 生产环境 Docker Compose
# 服务：nginx + backend + postgres + redis
# ============================================

version: "3.8"

services:
  # ---------- Nginx（SSL 终结 + 静态文件 + WebSocket 代理） ----------
  nginx:
    image: nginx:alpine
    container_name: papernote-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/ssl:ro
      - ../dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

  # ---------- 后端 ----------
  backend:
    build: ../backend
    container_name: papernote-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: papernote
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_BUCKET: ${COS_BUCKET}
      COS_REGION: ${COS_REGION}
      COS_CUSTOM_DOMAIN: ${COS_CUSTOM_DOMAIN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_HOURS: 24
      PORT: 8080
      WS_PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------- PostgreSQL 15 ----------
  postgres:
    image: postgres:15-alpine
    container_name: papernote-pg
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: papernote
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d papernote"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- Redis 7 ----------
  redis:
    image: redis:7-alpine
    container_name: papernote-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
