name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: papernote
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: papernote
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U papernote"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        run: go mod tidy
        env:
          GOPROXY: https://goproxy.cn,direct

      - name: Run migrations
        run: |
          for f in migrations/*.sql; do
            PGPASSWORD=testpass psql -h localhost -U papernote -d papernote -f "$f"
          done

      - name: Run tests
        run: go test ./...
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: papernote
          DB_PASSWORD: testpass
          DB_NAME: papernote
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: test-secret-for-ci-at-least-32-chars-long
          COS_SECRET_ID: ""
          COS_SECRET_KEY: ""
          COS_BUCKET: papernote
          COS_REGION: ap-shanghai
          COS_CUSTOM_DOMAIN: ""

      - name: Build
        run: go build -o server ./cmd/server
        env:
          GOPROXY: https://goproxy.cn,direct
