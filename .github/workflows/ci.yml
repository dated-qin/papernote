# ============================================
# 纸条 PaperNote — CI Pipeline
# frontend: install → tsc → vitest → build
# backend:  install → test → build
# e2e:      playwright
# deploy:   docker compose up
# ============================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ==================== 前端 ====================
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ==================== 后端 ====================
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: papernote
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: papernote
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U papernote"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}

      - name: Download dependencies
        run: go mod tidy

      - name: Run tests
        run: go test ./...
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: papernote
          DB_PASSWORD: testpass
          DB_NAME: papernote
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: test-secret-for-ci-at-least-32-chars-long
          OSS_ACCESS_KEY: ""
          OSS_SECRET_KEY: ""
          OSS_BUCKET: papernote
          OSS_ENDPOINT: ""

      - name: Build
        run: go build -o server ./cmd/server

  # ==================== E2E ====================
  e2e:
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: |
          npm run build
          npx vite preview --port 4173 &
          sleep 3
      - run: npx playwright test
        env:
          BASE_URL: http://localhost:4173

  # ==================== Deploy ====================
  deploy:
    needs: [frontend, backend, e2e]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to production
        run: |
          echo "Deploying to production server..."
          # rsync -avz dist/ user@server:/app/dist/
          # ssh user@server 'cd /app && docker compose -f docker/docker-compose.prod.yml up -d --build'
          echo "Deploy complete (placeholder — configure SSH credentials in repo secrets)"
